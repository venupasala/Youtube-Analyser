<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="YouTube Account Analyzer — Professional channel analytics, video search, and trending discovery dashboard.">
    <meta name="theme-color" content="#07070c">
    <title>YT Analytics — Channel Intelligence Platform</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23ff2d55' rx='20' width='100' height='100'/><polygon points='38,28 72,50 38,72' fill='white'/></svg>">
</head>
<body>

    <!-- Ambient background -->
    <div class="ambient-bg" aria-hidden="true">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
    </div>

    <!-- ═══ Sidebar Overlay (Mobile) ═══ -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- ═══ Sidebar Navigation ═══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
            </div>
            <div class="brand-text-group">
                <span class="brand-text">YT Analytics</span>
                <span class="brand-tagline">Intelligence Platform</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Menu</div>
            <ul>
                <li>
                    <a class="nav-item active" data-route="#dashboard" href="#dashboard">
                        <span class="nav-icon-wrap"><i data-lucide="layout-dashboard"></i></span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a class="nav-item" data-route="#search" href="#search">
                        <span class="nav-icon-wrap"><i data-lucide="search"></i></span>
                        <span>Search</span>
                    </a>
                </li>
                <li>
                    <a class="nav-item" data-route="#trending" href="#trending">
                        <span class="nav-icon-wrap"><i data-lucide="trending-up"></i></span>
                        <span>Trending</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-status" id="api-status">
                <div class="status-dot"></div>
                <div class="status-info">
                    <span class="status-text">Connecting...</span>
                    <span class="status-sub">API Health</span>
                </div>
            </div>
            <div class="sidebar-version">v1.0.0</div>
        </div>
    </aside>

    <!-- ═══ Main Content ═══ -->
    <main class="main-content">

        <!-- Top Bar -->
        <header class="top-bar">
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
                <i data-lucide="menu"></i>
            </button>

            <div class="top-bar-search">
                <div class="search-wrapper" id="search-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input
                        type="text"
                        id="global-search-input"
                        class="search-input"
                        placeholder="Analyze a channel — @handle, URL, or channel ID..."
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <kbd class="search-kbd">Enter ↵</kbd>
                </div>
            </div>

            <div class="top-bar-actions">
                <button class="top-bar-btn" id="theme-toggle" title="Settings" aria-label="Settings">
                    <i data-lucide="settings-2"></i>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-area" id="app-content">
            <!-- Views are rendered here by the router -->
        </div>

        <!-- ═══ Backend Offline Banner ═══ -->
        <div id="offline-banner" class="offline-banner" style="display:none;">
            <div class="offline-banner-content">
                <div class="offline-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
                <h2 class="offline-title">Backend Server Offline</h2>
                <p class="offline-text">
                    The API server is not running. Start the backend to use the dashboard.
                </p>
                <div class="offline-instructions">
                    <div class="offline-step">
                        <span class="offline-step-num">1</span>
                        <code>cd backend</code>
                    </div>
                    <div class="offline-step">
                        <span class="offline-step-num">2</span>
                        <code>python -m uvicorn main:app --host 0.0.0.0 --port 8080 --reload</code>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="window.BackendStatus.checkNow()" style="margin-top:20px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
                    Retry Connection
                </button>
            </div>
        </div>

    </main>

    <!-- ═══ Toast Notifications ═══ -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ═══ Scripts ═══ -->
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

    <!-- App modules (load order matters) -->
    <script src="js/components/loader.js"></script>
    <script src="js/components/videoCard.js"></script>
    <script src="js/components/charts.js"></script>
    <script src="js/api.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/search.js"></script>
    <script src="js/views/trending.js"></script>
    <script src="js/app.js"></script>

    <!-- Backend Status Monitor -->
    <script>
        (function() {
            let isOnline = false;
            let wasOnlineBefore = false;
            let checkInterval = null;

            async function checkStatus() {
                const dot = document.querySelector('#api-status .status-dot');
                const text = document.querySelector('#api-status .status-text');
                const banner = document.getElementById('offline-banner');
                const content = document.getElementById('app-content');

                try {
                    const resp = await fetch('/api/health', { signal: AbortSignal.timeout(5000) });
                    const data = await resp.json();

                    if (data.status === 'ok' || data.status === 'healthy') {
                        isOnline = true;
                        if (dot) { dot.classList.add('online'); dot.classList.remove('degraded'); }
                        if (text) text.textContent = 'All Systems Online';
                        if (banner) banner.style.display = 'none';
                        if (content) content.style.display = '';

                        // If this is a reconnection, reload the current view
                        if (!wasOnlineBefore) {
                            wasOnlineBefore = true;
                            if (window.App) window.App.handleRouteChange();
                            if (window.Loader) window.Loader.showToast('Backend connected!', 'success');
                        }
                    } else {
                        isOnline = true;
                        if (dot) { dot.classList.add('degraded'); dot.classList.remove('online'); }
                        if (text) text.textContent = 'Degraded Mode';
                        if (banner) banner.style.display = 'none';
                        if (content) content.style.display = '';
                        wasOnlineBefore = true;
                    }
                } catch (e) {
                    isOnline = false;
                    if (dot) { dot.classList.remove('online', 'degraded'); }
                    if (text) text.textContent = 'Backend Offline';
                    if (banner) banner.style.display = 'flex';
                    if (content) content.style.display = 'none';
                }
            }

            // Expose globally
            window.BackendStatus = {
                get isOnline() { return isOnline; },
                checkNow: function() {
                    checkStatus();
                    // Also show a brief loading state on the button
                    const btn = document.querySelector('#offline-banner .btn');
                    if (btn) {
                        btn.textContent = 'Checking...';
                        btn.disabled = true;
                        setTimeout(() => {
                            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg> Retry Connection';
                            btn.disabled = false;
                        }, 2000);
                    }
                }
            };

            // Check immediately, then every 10s
            setTimeout(checkStatus, 500);
            checkInterval = setInterval(checkStatus, 10000);
        })();
    </script>

</body>
</html>
