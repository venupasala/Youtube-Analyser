<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="YouTube Account Analyzer — Professional channel analytics, video search, and trending discovery dashboard.">
    <meta name="theme-color" content="#0a0a0f">
    <title>YouTube Analyzer — Channel Analytics Dashboard</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Favicon (inline SVG data URI) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
</head>
<body>

    <!-- ═══ Sidebar Overlay (Mobile) ═══ -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- ═══ Sidebar Navigation ═══ -->
    <aside class="sidebar" id="sidebar">
        <!-- Brand -->
        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3" fill="url(#brandGrad)" stroke="none"/>
                    <defs>
                        <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff2d55"/>
                            <stop offset="100%" style="stop-color:#ff6b35"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span class="brand-text">YT Analyzer</span>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a class="nav-item active" data-route="#dashboard" href="#dashboard">
                        <i data-lucide="layout-dashboard"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a class="nav-item" data-route="#search" href="#search">
                        <i data-lucide="search"></i>
                        <span>Search</span>
                    </a>
                </li>
                <li>
                    <a class="nav-item" data-route="#trending" href="#trending">
                        <i data-lucide="trending-up"></i>
                        <span>Trending</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Sidebar Footer -->
        <div class="sidebar-footer">
            <div class="sidebar-status" id="api-status">
                <div class="status-dot"></div>
                <span class="status-text">Connecting...</span>
            </div>
            <div class="sidebar-version">v1.0.0</div>
        </div>
    </aside>

    <!-- ═══ Main Content ═══ -->
    <main class="main-content">

        <!-- Top Bar -->
        <header class="top-bar">
            <!-- Mobile menu button -->
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
                <i data-lucide="menu"></i>
            </button>

            <!-- Search -->
            <div class="search-wrapper" id="search-wrapper">
                <i data-lucide="search" class="search-icon"></i>
                <input
                    type="text"
                    id="global-search-input"
                    class="search-input"
                    placeholder="Search channel by URL, @handle, or ID..."
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>

            <!-- Right actions -->
            <div class="top-bar-actions">
                <button class="top-bar-btn" id="theme-toggle" title="Settings" aria-label="Settings">
                    <i data-lucide="settings"></i>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-area" id="app-content">
            <!-- Views are rendered here by the router -->
        </div>

    </main>

    <!-- ═══ Toast Notifications ═══ -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ═══ Scripts ═══ -->
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

    <!-- App modules (load order matters) -->
    <script src="js/components/loader.js"></script>
    <script src="js/components/videoCard.js"></script>
    <script src="js/components/charts.js"></script>
    <script src="js/api.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/search.js"></script>
    <script src="js/views/trending.js"></script>
    <script src="js/app.js"></script>

    <!-- API Status Check -->
    <script>
        (function() {
            async function checkStatus() {
                const dot = document.querySelector('#api-status .status-dot');
                const text = document.querySelector('#api-status .status-text');
                try {
                    const resp = await fetch('/api/health');
                    const data = await resp.json();
                    if (data.status === 'ok') {
                        dot.classList.add('online');
                        dot.classList.remove('degraded');
                        text.textContent = 'All Systems Online';
                    } else {
                        dot.classList.add('degraded');
                        dot.classList.remove('online');
                        text.textContent = 'Degraded Mode';
                    }
                } catch (e) {
                    dot.classList.remove('online', 'degraded');
                    text.textContent = 'Backend Offline';
                }
            }
            // Check on load and every 30s
            setTimeout(checkStatus, 1000);
            setInterval(checkStatus, 30000);
        })();
    </script>

</body>
</html>
